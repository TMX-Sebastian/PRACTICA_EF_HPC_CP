name: Build and Deploy Container to Azure Web App

on:
push:
branches:
- main

env:
IMAGE_NAME: hpc-pdf-chatbot

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout del repositorio
    uses: actions/checkout@v4

  - name: Login en Azure Container Registry
    uses: docker/login-action@v3
    with:
      registry: ${{ secrets.ACR_LOGIN_SERVER }}
      username: ${{ secrets.ACR_USERNAME }}
      password: ${{ secrets.ACR_PASSWORD }}

  - name: Build de imagen Docker
    run: |
      docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest .

  - name: Push de imagen a Azure Container Registry
    run: |
      docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  - name: Deploy en Azure Web App for Container
    uses: azure/webapps-deploy@v3
    with:
      app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
      publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
```
